<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>

  <!-- Tailwind via CDN (MVP only — see UI_CONTEXT.md §3) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- HTMX via CDN -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="h-full text-gray-900 antialiased">
  <div class="flex h-full min-h-screen">

    <!-- Sidebar ----------------------------------------------------- -->
    <aside class="w-60 shrink-0 border-r border-gray-200 bg-white flex flex-col">
      <div class="h-16 flex items-center px-5 border-b border-gray-200">
        <div class="flex items-center gap-2">
          <div class="h-8 w-8 rounded-lg bg-green-600 flex items-center justify-center text-white font-semibold">S</div>
          <div class="text-sm font-semibold leading-tight">
            Sensgreen<br/>
            <span class="text-gray-500 font-normal">Simulator</span>
          </div>
        </div>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
        {% for item in nav_items %}
          {% set is_active = item.key == active_nav %}
          <a href="{{ item.href }}"
             class="group flex items-center gap-2 rounded-lg px-3 py-2 text-sm font-medium
                    {% if is_active %}bg-green-50 text-green-800 border-l-2 border-green-600 pl-[10px]{% else %}text-gray-700 hover:bg-gray-50{% endif %}
                    {% if item.scoped %}opacity-60{% endif %}">
            <span>{{ item.label }}</span>
            {% if item.scoped %}<span class="ml-auto text-[10px] uppercase tracking-wide text-gray-400">scoped</span>{% endif %}
          </a>
        {% endfor %}
      </nav>
      <div class="px-5 py-3 text-xs text-gray-400 border-t border-gray-200">
        v0.1 · internal tool
      </div>
    </aside>

    <!-- Main column ------------------------------------------------- -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- Header -->
      <header class="h-16 shrink-0 bg-white border-b border-gray-200 flex items-center px-6 gap-4">
        <h1 class="text-base font-semibold text-gray-800">
          {% block header_title %}{{ app_name }}{% endblock %}
        </h1>
        <div class="ml-auto flex items-center gap-2">
          <span class="inline-flex items-center gap-1 rounded-full bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-1">
            <span class="h-1.5 w-1.5 rounded-full bg-blue-500"></span> dev
          </span>
          <span class="inline-flex items-center gap-1 rounded-full bg-gray-100 text-gray-600 text-xs font-medium px-2.5 py-1"
                hx-get="/health" hx-trigger="load, every 30s" hx-swap="innerHTML">
            health: …
          </span>
        </div>
      </header>

      <!-- Page content -->
      <main class="flex-1 overflow-y-auto">
        <div class="max-w-[1200px] mx-auto px-6 py-6">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
