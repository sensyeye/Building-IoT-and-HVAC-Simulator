# Sensgreen Sensor Simulator — Dubai office sample project
# ---------------------------------------------------------
# A small 2-floor office in Dubai. Matches the project you created in
# the web dashboard ("Sensgreen Dubai Office Project").
#
# Run with:
#   python -m simulator.main generate-history \
#     --config configs/dubai_office.yaml \
#     --output-dir outputs/dubai_office \
#     --simulation-id dubai_office_demo \
#     --scenario meeting_room_poor_ventilation \
#     --scenario after_hours_energy_waste

# Note: device EUIs below are *synthetic* LoRaWAN-style 16-hex-char
# identifiers (private/experimental ``fe..`` prefix) generated by
# ``simulator.utils.eui.generate_eui()``. They are stable per
# (building_id, device_name) so re-running the generator produces
# the same values. For real publishes to the Sensgreen platform,
# replace each value with the EUI assigned by Sensgreen for that
# device.
#
building:
  id: bld-sensgreen-dubai-office
  name: "Sensgreen Dubai Office Project"
  timezone: "Asia/Dubai"
  # Documentation-only fields (loader ignores; useful for later features):
  building_type: office
  location: Dubai
  gross_area_m2: 1500
  floors: 2

  zones:
    - id: zone-reception
      name: "Reception"
      area_m2: 90.0
      capacity: 12
      metadata:
        type: lobby
        schedule_kind: open_office
        business_hour_start: 8
        business_hour_end: 19

    - id: zone-open-office
      name: "Open Office"
      area_m2: 700.0
      capacity: 60
      metadata:
        type: open_office
        schedule_kind: open_office
        business_hour_start: 9
        business_hour_end: 18

    - id: zone-meeting-a
      name: "Meeting Room A"
      area_m2: 40.0
      capacity: 12
      metadata:
        type: meeting_room
        schedule_kind: meeting_room

    - id: zone-pantry
      name: "Pantry"
      area_m2: 60.0
      capacity: 15
      metadata:
        type: cafeteria
        schedule_kind: open_office
        business_hour_start: 11
        business_hour_end: 15

devices:
  # ---------- IAQ (one per zone) ----------
  # Dubai indoor baselines: AC keeps temperature stable; humidity is
  # actively dehumidified, so 45-50 %RH is realistic even though outdoor
  # humidity is higher.
  - device_eui: "febf8be25f1a7585"
    name: "IAQ Reception"
    type: iaq
    zone_id: zone-reception
    metadata:
      interval_seconds: 60
      base_temperature_c: 23.0
      base_humidity_pct: 48.0

  - device_eui: "feb13a7604c9a478"
    name: "IAQ Open Office"
    type: iaq
    zone_id: zone-open-office
    metadata:
      interval_seconds: 60
      base_temperature_c: 22.5
      base_humidity_pct: 47.0

  - device_eui: "fe63a78ff62c9054"
    name: "IAQ Meeting Room A"
    type: iaq
    zone_id: zone-meeting-a
    metadata:
      interval_seconds: 60
      base_temperature_c: 22.5
      base_humidity_pct: 48.0

  - device_eui: "fe862f916f6f3faf"
    name: "IAQ Pantry"
    type: iaq
    zone_id: zone-pantry
    metadata:
      interval_seconds: 60
      base_temperature_c: 23.5
      base_humidity_pct: 52.0

  # ---------- People counter ----------
  - device_eui: "fee687ba51f60e5c"
    name: "Reception Entry/Exit Counter"
    type: entry_exit_counter
    zone_id: zone-reception
    metadata:
      interval_seconds: 60
      peak_flow_per_min: 1.4
      morning_peak_hour: 9.0
      evening_peak_hour: 18.0

  # ---------- Energy meters ----------
  # HVAC is the dominant load in Dubai — bumped vs. the Milan diagnostic.
  - device_eui: "fe4a2b9e4258e0e8"
    name: "Main Energy Meter"
    type: energy_meter
    zone_id: zone-reception
    metadata:
      interval_seconds: 300
      submeter: main
      nominal_kw: 110.0
      voltage_nominal: 230.0
      frequency_nominal: 50.0
      base_load_factor: 0.12

  - device_eui: "fe9684acd7c1b97c"
    name: "HVAC Energy Meter"
    type: energy_meter
    zone_id: zone-open-office
    metadata:
      interval_seconds: 300
      submeter: hvac
      nominal_kw: 60.0           # higher than Milan: cooling-dominated climate
      base_load_factor: 0.08

  - device_eui: "fe088f3dba4a67dd"
    name: "Lighting Energy Meter"
    type: energy_meter
    zone_id: zone-open-office
    metadata:
      interval_seconds: 300
      submeter: lighting
      nominal_kw: 18.0
      base_load_factor: 0.02

  - device_eui: "fe865afbbb4c6a85"
    name: "Plug Load Energy Meter"
    type: energy_meter
    zone_id: zone-open-office
    metadata:
      interval_seconds: 300
      submeter: plug
      nominal_kw: 22.0
      base_load_factor: 0.05

# ---------- Outputs ----------
outputs:
  mqtt:
    enabled: false
    host: "broker.example.sensgreen.com"
    port: 8883
    client_id: "sensgreen-simulator-dubai-office"
    tls: true
    topic_template: "sensgreen/{device_eui}"
  csv:
    enabled: true
    output_dir: "outputs/dubai_office"
    filename: "readings_long.csv"

# ---------- Simulation window ----------
# One business week (Sun-Thu) in Dubai, 2026-05-17 08:00 → 2026-05-22 08:00.
# Asia/Dubai is +04:00 (no DST).
simulation:
  mode: historical
  interval_seconds: 60
  start: "2026-05-17T08:00:00+04:00"
  end:   "2026-05-22T08:00:00+04:00"
  seed: 17

# ---------- Scenarios ----------
scenarios:
  - id: meeting_room_poor_ventilation
    target_zone: zone-meeting-a
    weekday: monday
    start: "10:00"
    end:   "12:00"
    expected:
      co2_max_ppm_above: 1200

  - id: after_hours_energy_waste
    target_zone: zone-open-office
    weekday: tuesday
    start: "20:00"
    end:   "23:00"
    expected:
      lighting_or_hvac_active_power_kw_above: 5.0
      occupancy_below: 5
